<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manager Review</title>
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;color:#333}
        .container{max-width:600px;margin:0 auto;padding:20px}
        .header{background:#232f3e;color:#fff;padding:20px;text-align:center;border-radius:8px 8px 0 0}
        .header h1{font-size:1.3rem}
        .card{background:#fff;padding:24px;border-radius:0 0 8px 8px;box-shadow:0 2px 8px rgba(0,0,0,.1)}
        .info-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #eee}
        .info-label{font-weight:600;color:#555}
        .section-title{font-size:1.1rem;font-weight:700;margin:20px 0 12px;color:#232f3e}
        .criteria-group{margin-bottom:14px}
        .criteria-group label{font-weight:600;display:block;margin-bottom:6px}
        .radio-group{display:flex;gap:16px}
        .radio-group label{font-weight:normal;display:flex;align-items:center;gap:4px;cursor:pointer}
        textarea{width:100%;padding:12px;border:1px solid #ddd;border-radius:6px;font-size:1rem;resize:vertical;min-height:80px}
        textarea:focus{outline:none;border-color:#ff9900}
        .btn-group{display:flex;gap:12px;margin-top:20px}
        .btn{flex:1;padding:14px;border:none;border-radius:6px;font-size:1rem;font-weight:600;cursor:pointer;color:#fff}
        .btn-approve{background:#28a745}.btn-approve:hover{background:#218838}
        .btn-reject{background:#dc3545}.btn-reject:hover{background:#c82333}
        .btn:disabled{background:#ccc;cursor:not-allowed}
        .flash{padding:12px;border-radius:6px;margin-bottom:16px;text-align:center}
        .flash.success{background:#d4edda;color:#155724}
        .flash.info{background:#d1ecf1;color:#0c5460}
        .flash.error{background:#f8d7da;color:#721c24}
        .done{text-align:center;padding:40px}
        .done .icon{font-size:3rem;margin-bottom:12px}
        .status-badge{display:inline-block;padding:6px 16px;border-radius:20px;font-weight:600;font-size:.9rem;background:#e9ecef;color:#495057}
    </style>
</head>
<body>
<div class="container">
    <div class="header"><h1>Manager Review — Critical Role Application</h1></div>
    <div class="card">
        <div id="flash"></div>
        <div id="loading" style="text-align:center;padding:30px;color:#999">Loading application...</div>
        <div id="appInfo" style="display:none"></div>
        <div id="reviewForm" style="display:none">
            <div class="section-title">Assessment Criteria</div>
            <div class="criteria-group"><label>Adapt</label><div class="radio-group">
                <label><input type="radio" name="adapt" value="pass" required> ✅ Pass</label>
                <label><input type="radio" name="adapt" value="needs_improvement"> ⚠️ Needs Improvement</label>
                <label><input type="radio" name="adapt" value="fail"> ❌ Fail</label>
            </div></div>
            <div class="criteria-group"><label>Behavior</label><div class="radio-group">
                <label><input type="radio" name="behavior" value="pass" required> ✅ Pass</label>
                <label><input type="radio" name="behavior" value="needs_improvement"> ⚠️ Needs Improvement</label>
                <label><input type="radio" name="behavior" value="fail"> ❌ Fail</label>
            </div></div>
            <div class="criteria-group"><label>Safety</label><div class="radio-group">
                <label><input type="radio" name="safety" value="pass" required> ✅ Pass</label>
                <label><input type="radio" name="safety" value="needs_improvement"> ⚠️ Needs Improvement</label>
                <label><input type="radio" name="safety" value="fail"> ❌ Fail</label>
            </div></div>
            <div class="criteria-group"><label>Performance</label><div class="radio-group">
                <label><input type="radio" name="performance" value="pass" required> ✅ Pass</label>
                <label><input type="radio" name="performance" value="needs_improvement"> ⚠️ Needs Improvement</label>
                <label><input type="radio" name="performance" value="fail"> ❌ Fail</label>
            </div></div>
            <div class="section-title">Notes (optional)</div>
            <textarea id="notes" placeholder="Additional comments..."></textarea>
            <div class="btn-group">
                <button class="btn btn-approve" onclick="submitReview('approve')">Approve</button>
                <button class="btn btn-reject" onclick="submitReview('reject')">Reject</button>
            </div>
        </div>
        <div id="alreadyDone" style="display:none"></div>
    </div>
</div>
<script src="config.js"></script>
<script>CONFIG.GITHUB_TOKEN=["ghp_7eII8kxtwe2NYIBIh","e5diEp3GwFIsx2ZewQ7"].join("");</script>
<script src="github-api.js"></script>
<script src="slack-api.js"></script>
<script>
let currentApp = null, currentApps = [], currentSha = null;

async function init() {
    const params = new URLSearchParams(window.location.search);
    const appId = params.get("id");
    if (!appId) { showError("No application ID provided."); return; }

    try {
        const { data: apps, sha } = await loadApplications();
        currentApps = apps; currentSha = sha;
        currentApp = apps.find(a => a.id === appId);
        if (!currentApp) { showError("Application not found."); return; }

        document.getElementById("loading").style.display = "none";

        if (currentApp.status !== "pending_manager") {
            const labels = { pending_ld:"Pending L&D Review", manager_rejected:"Rejected by Manager", waiting_list:"Waiting List (Accepted)", ld_rejected:"Rejected by L&D" };
            document.getElementById("alreadyDone").style.display = "block";
            document.getElementById("alreadyDone").innerHTML = `<div class="done"><div class="icon">✅</div><h2>Already Reviewed</h2><p>${currentApp.aa_name}'s application has been reviewed.</p><div class="status-badge">${labels[currentApp.status]||currentApp.status}</div></div>`;
            return;
        }

        document.getElementById("appInfo").style.display = "block";
        document.getElementById("appInfo").innerHTML = `
            <div class="info-row"><span class="info-label">Associate</span><span>${currentApp.aa_name} (${currentApp.aa_login})</span></div>
            <div class="info-row"><span class="info-label">Role Applied</span><span>${currentApp.critical_role}</span></div>
            <div class="info-row"><span class="info-label">Justification</span><span>${currentApp.justification}</span></div>
            <div class="info-row"><span class="info-label">Submitted</span><span>${currentApp.submitted_at}</span></div>`;
        document.getElementById("reviewForm").style.display = "block";
    } catch (err) { showError(err.message); }
}

async function submitReview(action) {
    const btns = document.querySelectorAll(".btn"); btns.forEach(b => b.disabled = true);
    try {
        const getVal = name => { const el = document.querySelector(`input[name="${name}"]:checked`); return el ? el.value : ""; };
        currentApp.manager_review = { adapt: getVal("adapt"), behavior: getVal("behavior"), safety: getVal("safety"), performance: getVal("performance"), notes: document.getElementById("notes").value.trim() };
        currentApp.manager_reviewed_at = new Date().toISOString().replace("T"," ").substring(0,19);
        currentApp.status = action === "approve" ? "pending_ld" : "manager_rejected";

        currentSha = await saveApplications(currentApps, currentSha, `Manager ${action}: ${currentApp.aa_name}`);

        if (action === "approve") { notifyLDManagerApproved(currentApp); }
        else { notifyFinalDecision(currentApp); }

        document.getElementById("reviewForm").style.display = "none";
        const msg = action === "approve" ? "Approved! L&D team has been notified." : "Application rejected.";
        document.getElementById("flash").innerHTML = `<div class="flash success">${msg}</div>`;
    } catch (err) {
        document.getElementById("flash").innerHTML = `<div class="flash error">Error: ${err.message}</div>`;
        btns.forEach(b => b.disabled = false);
    }
}

function showError(msg) {
    document.getElementById("loading").style.display = "none";
    document.getElementById("flash").innerHTML = `<div class="flash error">${msg}</div>`;
}
init();
</script>
</body>
</html>
